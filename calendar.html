<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — TaskPro</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='8' y='8' width='38' height='38' rx='10' fill='%237c3aed'/><rect x='54' y='8' width='38' height='38' rx='10' fill='%237c3aed' opacity='0.5'/><rect x='8' y='54' width='38' height='38' rx='10' fill='%237c3aed' opacity='0.5'/><rect x='54' y='54' width='38' height='38' rx='10' fill='%237c3aed'/></svg>">
</head>
<body>

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 100 100" fill="none" width="22" height="22">
            <rect x="8" y="8" width="38" height="38" rx="10" fill="white"/>
            <rect x="54" y="8" width="38" height="38" rx="10" fill="white" opacity="0.5"/>
            <rect x="8" y="54" width="38" height="38" rx="10" fill="white" opacity="0.5"/>
            <rect x="54" y="54" width="38" height="38" rx="10" fill="white"/>
          </svg>
        </div>
        <span class="sidebar-logo-text">TaskPro</span>
      </a>
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"></polyline><polyline points="18 17 13 12 18 7"></polyline></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="projects.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Projects</span>
      </a>
      <a href="calendar.html" class="nav-item active" id="navCalendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>Calendar</span>
      </a>

      <div class="nav-section-label">Projects</div>
      <div id="sidebarProjectList"></div>
    </nav>
    
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="userAvatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">User Name</div>
          <div class="sidebar-user-role">Premium Member</div>
        </div>
        <a href="#" class="sidebar-logout" id="logoutBtn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content">
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Search tasks..." autocomplete="off">
        <kbd>⌘K</kbd>
        <div id="searchResults" class="search-results-dropdown hidden"></div>
      </div>
      <div class="topbar-actions">
         <select id="projectFilter" class="filter-select">
            <option value="All">All Projects</option>
         </select>
         <button class="btn-new-task" id="newTaskBtn">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
           New Task
         </button>
      </div>
    </header>

    <div class="calendar-page-content">
      <div class="calendar-nav-bar">
         <div class="calendar-info">
            <h1 id="currentMonthYear">Month Year</h1>
            <p id="calendarSubtitle">Manage your schedule and deadlines.</p>
         </div>
         <div class="calendar-actions">
            <button class="btn-today" id="todayBtn">Today</button>
            <div class="nav-arrows">
               <button class="arrow-btn" id="prevMonth"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
               <button class="arrow-btn" id="nextMonth"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            </div>
            <div class="view-tabs">
               <button class="view-tab active" data-view="month">Month</button>
               <button class="view-tab" data-view="week">Week</button>
            </div>
         </div>
      </div>

      <div class="calendar-wrapper glass-panel anim-fade-up">
        <div class="calendar-header-grid">
          <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div class="calendar-grid-body" id="calendarGrid">
           <!-- Days injected here -->
        </div>
      </div>
    </div>
  </main>

  <!-- Task Modal Overlay -->
  <div id="taskModal" class="modal-overlay">
    <div class="modal-card glass-modal anim-scale-up">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Create New Task</h2>
          <p>Set a timeline for your workspace goal.</p>
        </div>
        <button class="close-modal" id="closeModal">&times;</button>
      </div>
      <form id="taskForm">
        <div class="form-group">
          <label for="taskTitle">Task Title <span class="required">*</span></label>
          <input type="text" id="taskTitle" required placeholder="e.g., Design System Review">
        </div>
        <div class="form-group">
          <label for="taskDesc">Description</label>
          <textarea id="taskDesc" rows="3" placeholder="What needs to be done?"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskProject">Project</label>
            <select id="taskProject" class="modal-select">
              <option value="">No Project (General)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskAssignedTo">Assignee</label>
            <select id="taskAssignedTo" class="modal-select">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus" class="modal-select">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskCategory">Category</label>
            <select id="taskCategory" class="modal-select">
              <option value="Design">Design</option>
              <option value="Frontend">Frontend</option>
              <option value="Backend">Backend</option>
              <option value="General">General</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDeadline">Deadline</label>
            <input type="date" id="taskDeadline" class="modal-date">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger hidden" id="deleteTaskBtn">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
             Delete
          </button>
          <div class="modal-submit-actions">
            <button type="button" class="btn btn-ghost" id="cancelModalBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/calendar.js"></script>
</body>
</html>
